openAPI: 3.1.0
info:
  title: ServiceHomes API
  version: 0.0.1
  description: ServiceHomes REST API contract with Auth0 JWT authentication outside the local and ci profiles

servers:
  - url: http://localhost:8080/api

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK

  /me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'

  /me/profile:
    patch:
      summary: Update current user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'

  /me/profile/avatar-upload-url:
    post:
      summary: Create a presigned avatar upload target
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarUploadRequest'
      responses:
        '200':
          description: Presigned upload target
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'

  /me/become-host:
    post:
      summary: Enable hosting for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated user profile with host role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'

  /hosts/{hostId}:
    get:
      summary: Get public host profile
      parameters:
        - name: hostId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Public host profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostProfile'

  /listings:
    post:
      summary: Create listing
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Created listing
    get:
      summary: List host listings
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of listings

  /listings/{id}:
    get:
      summary: Get listing by ID
      responses:
        '200':
          description: Listing detail
    put:
      summary: Update listing
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Updated listing

  /listings/{id}/publish:
    post:
      summary: Publish listing
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Published listing

  /listings/{id}/unpublish:
    post:
      summary: Unpublish listing
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Unpublished listing

  /listings/{id}/availability:
    get:
      summary: Get host availability rules
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listing availability rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingAvailability'
    put:
      summary: Replace host availability rules
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListingAvailabilityRequest'
      responses:
        '200':
          description: Updated listing availability rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingAvailability'

  /listings/{id}/calendar:
    get:
      summary: Get host listing calendar day view
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Listing calendar day view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingCalendar'

  /listings/search:
    get:
      summary: Search published listings
      parameters:
        - name: listingId
          in: query
          schema:
            type: string
            format: uuid
        - name: locationQuery
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
            format: uuid
        - name: guests
          in: query
          schema:
            type: integer
        - name: checkIn
          in: query
          schema:
            type: string
            format: date
        - name: checkOut
          in: query
          schema:
            type: string
            format: date
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: bedrooms
          in: query
          schema:
            type: integer
        - name: propertyTypes
          in: query
          schema:
            type: array
            items:
              type: string
        - name: instantBook
          in: query
          schema:
            type: boolean
        - name: lat
          in: query
          schema:
            type: number
        - name: lng
          in: query
          schema:
            type: number
        - name: radiusKm
          in: query
          schema:
            type: number
        - name: sort
          in: query
          schema:
            type: string
            enum: [RELEVANCE, PRICE_ASC, PRICE_DESC, NEWEST]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: swLat
          in: query
          schema:
            type: number
        - name: swLng
          in: query
          schema:
            type: number
        - name: neLat
          in: query
          schema:
            type: number
        - name: neLng
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageListingSearchResult'

  /saved-listings:
    get:
      summary: List saved listings for the current traveler
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Saved listing cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListingSearchResult'

  /listings/categories:
    get:
      summary: List all listing categories
      responses:
        '200':
          description: List of categories

  /listings/amenities:
    get:
      summary: List all listing amenities
      responses:
        '200':
          description: List of amenities

  /listings/my:
    get:
      summary: List current user's listings (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of listings

  /reservations:
    post:
      summary: Create reservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '200':
          description: Created reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/quote:
    post:
      summary: Get price quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Price quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'

  /reservations/my:
    get:
      summary: List current user's reservations (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of reservations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationPage'

  /reservations/host:
    get:
      summary: List host's reservations (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of reservations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationPage'

  /reservations/{id}:
    get:
      summary: Get reservation by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reservation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/cancel:
    post:
      summary: Cancel reservation as guest
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cancelled reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/cancel-by-host:
    post:
      summary: Cancel reservation as host
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cancelled reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/accept:
    post:
      summary: Accept reservation as host
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Confirmed reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/decline:
    post:
      summary: Decline reservation as host
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Declined reservation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /reservations/{id}/messages:
    get:
      summary: Get reservation message thread
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reservation message thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageThread'
    post:
      summary: Send a reservation message
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Updated reservation message thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageThread'

  /inbox:
    get:
      summary: List inbox threads for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Inbox threads sorted by latest activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InboxThread'

  /saved-listings/{listingId}:
    put:
      summary: Save a listing for the current traveler
      security:
        - bearerAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Listing saved
    delete:
      summary: Remove a saved listing for the current traveler
      security:
        - bearerAuth: []
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Listing unsaved

  /reservations/{reservationId}/messages:
    get:
      summary: Load the message thread for a reservation
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reservation thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageThread'
    post:
      summary: Send a message on a reservation thread
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Updated reservation thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageThread'

  /reservations/{id}/review:
    post:
      summary: Create a review for an eligible reservation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '200':
          description: Created review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /host/dashboard:
    get:
      summary: Get host dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Host dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostDashboard'

  /guest/dashboard:
    get:
      summary: Get guest dashboard summary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Guest dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestDashboard'

  /reviews/{id}/response:
    post:
      summary: Add a host response to a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddHostResponseRequest'
      responses:
        '200':
          description: Review with host response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /listings/{id}/reviews:
    get:
      summary: List reviews for a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated listing reviews and aggregate rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingReviewsResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Auth0-issued access token. Local and ci profiles bypass external Auth0 validation for developer and test workflows.
  schemas:
    ListingCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        description:
          type: string

    AmenityDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
        category:
          type: string

    ListingLocation:
      type: object
      properties:
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number

    ListingPolicy:
      type: object
      properties:
        checkInTime:
          type: string
        checkOutTime:
          type: string
        minNights:
          type: integer
        maxNights:
          type: integer
        cancellationPolicy:
          type: string
          enum: [FLEXIBLE, MODERATE, STRICT]
        instantBook:
          type: boolean

    ListingPhoto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        orderIndex:
          type: integer
        isCover:
          type: boolean

    AvailabilityRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ruleType:
          type: string
          enum: [BLOCKED_DATE, MIN_NIGHTS_OVERRIDE, PRICE_OVERRIDE]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        value:
          type: number

    Listing:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        category:
          $ref: '#/components/schemas/ListingCategory'
        propertyType:
          type: string
        maxGuests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: integer
        nightlyPrice:
          type: number
        cleaningFee:
          type: number
        serviceFee:
          type: number
        status:
          type: string
          enum: [DRAFT, PUBLISHED, UNPUBLISHED]
        location:
          $ref: '#/components/schemas/ListingLocation'
        policy:
          $ref: '#/components/schemas/ListingPolicy'
        photos:
          type: array
          items:
            $ref: '#/components/schemas/ListingPhoto'
        amenities:
          type: array
          items:
            $ref: '#/components/schemas/AmenityDto'

    ListingAvailability:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        baseNightlyPrice:
          type: number
        defaultMinNights:
          type: integer
        rules:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityRule'

    ListingCalendarDay:
      type: object
      properties:
        date:
          type: string
          format: date
        blocked:
          type: boolean
        minNights:
          type: integer
        nightlyPrice:
          type: number
        minNightsOverride:
          type: boolean
        priceOverride:
          type: boolean

    ListingCalendar:
      type: object
      properties:
        listingId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        days:
          type: array
          items:
            $ref: '#/components/schemas/ListingCalendarDay'

    ListingCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        coverUrl:
          type: string
        city:
          type: string
        country:
          type: string
        nightlyPrice:
          type: number
        categoryName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        maxGuests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: integer

    ListingSearchResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        coverUrl:
          type: string
        city:
          type: string
        country:
          type: string
        nightlyPrice:
          type: number
        categoryName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        maxGuests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: integer
        distanceKm:
          type: number
          nullable: true
        averageRating:
          type: number
          nullable: true
        reviewCount:
          type: integer
        isSaved:
          type: boolean
        distanceKm:
          type: number
          nullable: true
        averageRating:
          type: number
          nullable: true
        reviewCount:
          type: integer

    PageListing:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Listing'
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    PageReservation:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Reservation'
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    CreateListingRequest:
      type: object
      required: [title, description, categoryId, propertyType, maxGuests, bedrooms, beds, bathrooms, nightlyPrice]
      properties:
        title:
          type: string
        description:
          type: string
        categoryId:
          type: string
          format: uuid
        propertyType:
          type: string
        maxGuests:
          type: integer
        bedrooms:
          type: integer
        beds:
          type: integer
        bathrooms:
          type: integer
        nightlyPrice:
          type: number
        cleaningFee:
          type: number
        serviceFee:
          type: number
        location:
          $ref: '#/components/schemas/ListingLocation'
        policy:
          $ref: '#/components/schemas/ListingPolicy'
        amenityIds:
          type: array
          items:
            type: string
            format: uuid

    CreateReservationRequest:
      type: object
      required: [listingId, checkIn, checkOut, guests]
      properties:
        listingId:
          type: string
          format: uuid
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        guests:
          type: integer

    UpdateListingAvailabilityRequest:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          items:
            type: object
            required: [ruleType, startDate, endDate]
            properties:
              ruleType:
                type: string
                enum: [BLOCKED_DATE, MIN_NIGHTS_OVERRIDE, PRICE_OVERRIDE]
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date
              value:
                type: number

    Reservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid
        listingTitle:
          type: string
        listingCoverUrl:
          type: string
        listingCity:
          type: string
        listingCountry:
          type: string
        guestId:
          type: string
          format: uuid
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        guests:
          type: integer
        totalNights:
          type: integer
        nightlyPrice:
          type: number
        cleaningFee:
          type: number
        serviceFee:
          type: number
        totalAmount:
          type: number
        status:
          type: string
          enum: [PENDING, CONFIRMED, DECLINED, CANCELLED_BY_GUEST, CANCELLED_BY_HOST, COMPLETED]
        hostDisplayName:
          type: string
        guestDisplayName:
          type: string

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 5000

    MessageItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        senderDisplayName:
          type: string
        senderAvatarUrl:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
        mine:
          type: boolean

    MessageThread:
      type: object
      properties:
        threadId:
          type: string
          format: uuid
          nullable: true
        reservationId:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid
        listingTitle:
          type: string
        listingCoverUrl:
          type: string
          nullable: true
        guestId:
          type: string
