<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
</head>
<body style="margin:0;background:#f5f2ea;color:#24211c;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f2ea;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#fffaf0;border:1px solid #e2d7c1;border-radius:24px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 8px 32px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#806e52;">
              ServiceHomes
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 12px 32px;">
              <h1 style="margin:0;font-size:30px;line-height:1.15;color:#24211c;">{{title}}</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px 32px;font-family:Arial,sans-serif;font-size:16px;line-height:1.6;color:#4a4033;">
              <p style="margin:0 0 16px 0;">Hi {{recipientName}},</p>
              <p style="margin:0;">{{body}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 34px 32px;">
              <a href="{{actionUrl}}" style="display:inline-block;background:#22352c;color:#fffaf0;text-decoration:none;font-family:Arial,sans-serif;font-size:15px;font-weight:700;padding:14px 22px;border-radius:999px;">
                Open ServiceHomes
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 32px;background:#efe6d4;font-family:Arial,sans-serif;font-size:12px;line-height:1.5;color:#806e52;">
              Notification type: {{notificationType}}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
