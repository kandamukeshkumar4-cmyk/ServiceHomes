spring:
  application:
    name: servicehomes-api
  datasource:
    url: jdbc:postgresql://localhost:5432/servicehomes
    username: servicehomes
    password: servicehomes
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.servicehomes: DEBUG
