spring:
  application:
    name: servicehomes-api
  datasource:
    url: jdbc:postgresql://localhost:5432/servicehomes
    username: servicehomes
    password: servicehomes
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

auth0:
  domain: ${AUTH0_DOMAIN:your-auth0-domain}
  audience: ${AUTH0_AUDIENCE:your-auth0-audience}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:servicehomes-media}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_S3_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  ses:
    region: ${AWS_SES_REGION:${AWS_REGION:us-east-1}}
    endpoint: ${AWS_SES_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

messaging:
  email:
    enabled: ${MESSAGING_EMAIL_ENABLED:false}
    from-address: ${MESSAGING_EMAIL_FROM:no-reply@servicehomes.example.com}
    quiet-period-minutes: ${MESSAGING_EMAIL_QUIET_PERIOD_MINUTES:5}

logging:
  level:
    com.servicehomes: DEBUG
