version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: sh-postgres
    environment:
      POSTGRES_USER: servicehomes
      POSTGRES_PASSWORD: servicehomes
      POSTGRES_DB: servicehomes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicehomes -d servicehomes"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: sh-localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
