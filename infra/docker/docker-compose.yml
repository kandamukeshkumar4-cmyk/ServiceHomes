services:
  db:
    image: postgis/postgis:15-3.4
    container_name: sh-postgres
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servicehomes}
      POSTGRES_USER: ${POSTGRES_USER:-servicehomes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicehomes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servicehomes} -d ${POSTGRES_DB:-servicehomes}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - servicehomes-network

  localstack:
    image: localstack/localstack:latest
    container_name: sh-localstack
    environment:
      SERVICES: s3
      DEFAULT_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - servicehomes-network

  api:
    build:
      context: ../../apps/api-spring
      dockerfile: Dockerfile
    container_name: sh-api
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-servicehomes}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-servicehomes}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-servicehomes}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-local-dev-bypass}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-local-dev-bypass}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-servicehomes-media}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-http://localstack:4566}
      AWS_SES_ENDPOINT: ${AWS_SES_ENDPOINT:-http://localstack:4566}
      MESSAGING_EMAIL_ENABLED: ${MESSAGING_EMAIL_ENABLED:-false}
      MESSAGING_EMAIL_FROM: ${MESSAGING_EMAIL_FROM:-no-reply@servicehomes.example.com}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    restart: unless-stopped
    networks:
      - servicehomes-network

  web:
    build:
      context: ../../apps/web-angular
      dockerfile: Dockerfile
    container_name: sh-web
    ports:
      - "${NGINX_PORT:-4200}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - servicehomes-network

volumes:
  postgres_data:
  localstack_data:

networks:
  servicehomes-network:
    driver: bridge
