services:
  db:
    image: postgis/postgis:15-3.4
    container_name: sh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-servicehomes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicehomes}
      POSTGRES_DB: ${POSTGRES_DB:-servicehomes}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servicehomes} -d ${POSTGRES_DB:-servicehomes}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - servicehomes-network

  minio:
    image: minio/minio:latest
    container_name: sh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-servicehomes}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-servicehomes123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - servicehomes-network

  minio-init:
    image: minio/mc:latest
    container_name: sh-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - until /usr/bin/mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-servicehomes} ${AWS_SECRET_ACCESS_KEY:-servicehomes123}; do sleep 2; done && /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-servicehomes-media-local}
    restart: "no"
    networks:
      - servicehomes-network

  api:
    build:
      context: ../../apps/api-spring
      dockerfile: Dockerfile
    container_name: sh-api
    environment:
      APP_SERVER_PORT: 8081
      MANAGEMENT_SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-servicehomes}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-servicehomes}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-servicehomes}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-servicehomes}
      POSTGRES_USER: ${POSTGRES_USER:-servicehomes}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-local.invalid}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-servicehomes-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${S3_BUCKET:-servicehomes-media-local}
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-servicehomes}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-servicehomes123}
      AWS_SES_ENDPOINT: ""
      MESSAGING_EMAIL_ENABLED: ${MESSAGING_EMAIL_ENABLED:-false}
    entrypoint:
      - /bin/sh
      - -c
      - /bin/sh /opt/servicehomes/wait-for-postgres.sh && exec java -jar /opt/servicehomes/app.jar
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./scripts/wait-for-postgres.sh:/opt/servicehomes/wait-for-postgres.sh:ro
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - servicehomes-network

  web:
    build:
      context: ../../apps/web-angular
      dockerfile: Dockerfile
    container_name: sh-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-4200}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - servicehomes-network

volumes:
  postgres_data:
  minio_data:

networks:
  servicehomes-network:
    name: servicehomes-network
