name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'data/**', 'ops/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: servicehomes
          POSTGRES_USER: servicehomes
          POSTGRES_PASSWORD: servicehomes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api-spring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: ./mvnw verify -Dspring.profiles.active=ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-angular
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  dbt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analytics-dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install dbt-snowflake
      - run: dbt deps
      - run: dbt parse
      - run: dbt test
