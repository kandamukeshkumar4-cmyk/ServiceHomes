name: No-Mistakes QA Pipeline

on:
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Validate PR can be rebased cleanly
  rebase-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Attempt rebase onto target branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin ${{ github.base_ref || 'master' }}
          git rebase origin/${{ github.base_ref || 'master' }}
        continue-on-error: true
        id: rebase

      - name: Check rebase status
        if: steps.rebase.outcome == 'failure'
        run: |
          echo "::error::PR has merge conflicts with ${{ github.base_ref || 'master' }}. Please rebase locally."
          exit 1

  # Job 2: Backend validation
  backend-qa:
    runs-on: ubuntu-latest
    needs: rebase-check
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: servicehomes
          POSTGRES_USER: servicehomes
          POSTGRES_PASSWORD: servicehomes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Backend compile
        working-directory: apps/api-spring
        run: mvn compile -DskipTests

      - name: Backend tests
        working-directory: apps/api-spring
        run: mvn test -Dspring.profiles.active=ci

      - name: Backend integration tests
        working-directory: apps/api-spring
        run: mvn verify -Dspring.profiles.active=ci

  # Job 3: Frontend validation
  frontend-qa:
    runs-on: ubuntu-latest
    needs: rebase-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web-angular/package-lock.json

      - name: Install dependencies
        working-directory: apps/web-angular
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Frontend lint
        working-directory: apps/web-angular
        run: npm run lint
        continue-on-error: true

      - name: Frontend build
        working-directory: apps/web-angular
        run: npm run build

      - name: Frontend test
        working-directory: apps/web-angular
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

  # Job 4: dbt validation
  dbt-qa:
    runs-on: ubuntu-latest
    needs: rebase-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: dbt deps
        working-directory: apps/analytics-dbt
        run: dbt deps

      - name: dbt parse
        working-directory: apps/analytics-dbt
        run: dbt parse

      - name: dbt test
        working-directory: apps/analytics-dbt
        run: dbt test
        continue-on-error: true

  # Job 5: Documentation check
  docs-qa:
    runs-on: ubuntu-latest
    needs: [backend-qa, frontend-qa]
    steps:
      - uses: actions/checkout@v4

      - name: Check README is up to date
        run: |
          # Check if README mentions all major components
          if ! grep -q "apps/api-spring" README.md; then
            echo "::warning::README.md may be outdated - missing backend reference"
          fi
          if ! grep -q "apps/web-angular" README.md; then
            echo "::warning::README.md may be outdated - missing frontend reference"
          fi
          if ! grep -q "apps/analytics-dbt" README.md; then
            echo "::warning::README.md may be outdated - missing analytics reference"
          fi

      - name: Check ADR files exist
        run: |
          if [ ! -f "docs/adr/ADR-001-architecture.md" ]; then
            echo "::warning::Missing ADR files"
          fi

      - name: Check API contracts are documented
        run: |
          if [ ! -f "packages/api-contracts/openapi.yml" ]; then
            echo "::error::Missing API contracts"
            exit 1
          fi

  # Job 6: Security scan
  security-qa:
    runs-on: ubuntu-latest
    needs: rebase-check
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: master
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # Job 7: Final gate - all checks must pass
  qa-gate:
    runs-on: ubuntu-latest
    needs: [backend-qa, frontend-qa, dbt-qa, docs-qa, security-qa]
    if: always()
    steps:
      - name: Check all QA jobs passed
        run: |
          if [ "${{ needs.backend-qa.result }}" != "success" ]; then
            echo "::error::Backend QA failed"
            exit 1
          fi
          if [ "${{ needs.frontend-qa.result }}" != "success" ]; then
            echo "::error::Frontend QA failed"
            exit 1
          fi
          if [ "${{ needs.dbt-qa.result }}" != "success" ]; then
            echo "::warning::dbt QA failed (non-blocking)"
          fi
          if [ "${{ needs.docs-qa.result }}" != "success" ]; then
            echo "::warning::Docs QA failed (non-blocking)"
          fi
          echo "✅ All required QA checks passed"

      - name: Comment PR with QA results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              rebase: '${{ needs.rebase-check.result }}',
              backend: '${{ needs.backend-qa.result }}',
              frontend: '${{ needs.frontend-qa.result }}',
              dbt: '${{ needs.dbt-qa.result }}',
              docs: '${{ needs.docs-qa.result }}',
              security: '${{ needs.security-qa.result }}'
            };
            
            const status = (result) => result === 'success' ? '✅' : '❌';
            
            const body = `## No-Mistakes QA Pipeline Results
            
            | Check | Status |
            |-------|--------|
            | Rebase | ${status(results.rebase)} |
            | Backend | ${status(results.backend)} |
            | Frontend | ${status(results.frontend)} |
            | dbt | ${status(results.dbt)} |
            | Docs | ${status(results.docs)} |
            | Security | ${status(results.security)} |
            
            ${Object.values(results).every(r => r === 'success') ? '✅ All checks passed! Ready to merge.' : '⚠️ Some checks failed. Please review and fix.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
